frontend.warmupDuration:
- value: "1s"
  constraints: {}
frontend.enableActiveClusterSelectionPolicyInStartWorkflow:
- value: true
  constraints: {}
# Adds the schedule search attributes on top of the default whitelist; without
# them the scheduler workflow's UpsertSearchAttributes decision is rejected
# and the workflow loops in decision-task retries.
frontend.validSearchAttributes:
- value:
    DomainID: 1
    WorkflowID: 1
    RunID: 1
    WorkflowType: 1
    StartTime: 2
    ExecutionTime: 2
    CloseTime: 2
    CloseStatus: 2
    HistoryLength: 2
    TaskList: 1
    IsCron: 4
    NumClusters: 2
    UpdateTime: 2
    CronSchedule: 1
    ExecutionStatus: 2
    ScheduledExecutionTime: 2
    ClusterAttributeScope: 1
    ClusterAttributeName: 1
    CustomStringField: 0
    CustomKeywordField: 1
    CustomIntField: 2
    CustomBoolField: 4
    CustomDoubleField: 3
    CustomDatetimeField: 5
    CadenceChangeVersion: 1
    BinaryChecksums: 1
    CustomDomain: 0
    Operator: 0
    CadenceScheduleState: 1
    CadenceScheduleCron: 1
    CadenceScheduleWorkflowType: 1
    CadenceScheduleID: 1
    CadenceScheduleTime: 5
    CadenceScheduleIsBackfill: 4
  constraints: {}
