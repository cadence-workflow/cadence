enablearchival: false
clusterno: 0
messagingclientconfig:
  usemock: true
historyconfig:
  numhistoryshards: 16
  numhistoryhosts: 3
  chaosconfig:
    enable: true
    intervalms: 3000
    jitterms: 1000
    minhistoryhosts: 1
  simulationconfig:
    numworkflows: 5
    workflowstartdelayms: 0
    minsimulationdurationseconds: 60
    testtimeoutseconds: 180
    workflowexecutiontimeoutseconds: 90
    endsleepseconds: 15
matchingconfig:
  nummatchinghosts: 1
workerconfig:
  enableasyncwfconsumer: false
  enablearchiver: false
  enablereplicator: false
  enableindexer: false
dynamicclientconfig:
  filepath: "dynamicconfig/default.yaml"
  pollInterval: "10s"
