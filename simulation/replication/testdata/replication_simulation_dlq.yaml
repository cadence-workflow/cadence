# This file is a replication simulation scenario spec.
# It is parsed into ReplicationSimulationConfig struct.
# Replication simulation for this file can be run via ./simulation/replication/run.sh --scenario dlq
# Dynamic config overrides can be set via config/dynamicconfig/replication_simulation_dlq.yml
#
# Tests the history-task DLQ fill + drain-via-failover flow:
#   1. Many active-active workflows run active in region0 (cluster0). While they run, the standby
#      cluster (cluster1) processes standby timer tasks; the dynamic config forces the DLQ-fill
#      race (standbyClusterDelay ~0 + resendDelay 0s + discardDelay 0s + throttled replication),
#      so some unverifiable standby timer tasks are written to cluster1's history-task DLQ. Heavy
#      load raises the chance at least one task lands in the DLQ.
#   2. validate_dlq asserts the standby DLQ (cluster1 keyspace) has filled up.
#   3. The domain fails over region0 -> cluster1, making cluster1 active for the workflows.
#   4. The history-task DLQ processor on cluster1 re-injects the DLQ tasks into the executions
#      table and advances the ack level, draining the DLQ.
#   5. validate_dlq asserts the DLQ has drained to zero; validate_dlq_ack_level asserts the ack
#      level advanced past the fill-time sentinel; and validate asserts workflows completed successfully

clusters:
  cluster0:
    grpcEndpoint: "cadence-cluster0:7833"
  cluster1:
    grpcEndpoint: "cadence-cluster1:7833"

# primaryCluster is where domain data is written to and replicates to others. e.g. domain registration
primaryCluster: "cluster0"

domains:
  test-domain-aa:
    activeClusterName: cluster0
    clusterAttributes:
      region:
        region0: cluster0
        region1: cluster1

operations:
  # Start many long-running workflows active in region0 (cluster0). They keep generating transfer
  # and timer tasks, so the standby (cluster1) has many chances to accumulate history-task DLQ rows.
  - op: start_workflow
    at: 0s
    workflowID: dlq-wf1
    workflowType: timer-activity-loop-workflow
    cluster: cluster0
    domain: test-domain-aa
    workflowExecutionStartToCloseTimeout: 180s
    workflowDuration: 120s
    activeClusterSelectionPolicy:
      clusterAttribute:
        scope: region
        name: region0
  - op: start_workflow
    at: 0s
    workflowID: dlq-wf2
