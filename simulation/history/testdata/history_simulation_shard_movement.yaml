enablearchival: false
clusterno: 0
messagingclientconfig:
  usemock: true
historyconfig:
  numhistoryshards: 16
  numhistoryhosts: 3
  chaosconfig:
    enable: true
    intervalms: 5000
    jitterms: 2000
    minhistoryhosts: 1
  simulationconfig:
    numworkflows: 20
    sleepbetweenworkflowstarts: 15000000000  # 15 seconds
    timeout: 600000000000       # 10 minutes
    sleepafterallworkflows: 30000000000   # 30 seconds
matchingconfig:
  nummatchinghosts: 1
workerconfig:
  enableasyncwfconsumer: false
  enablearchiver: false
  enablereplicator: false
  enableindexer: false
dynamicclientconfig:
  filepath: "dynamicconfig/default.yaml"
  pollInterval: "10s"
