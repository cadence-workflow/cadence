    workflowExecutionStartToCloseTimeout: 180s
    workflowDuration: 120s
    activeClusterSelectionPolicy:
      clusterAttribute:
        scope: region
        name: region0

  # Assert that the standby cluster (cluster1) has accumulated DLQ rows for the
  # domain.
  - op: validate_dlq
    at: 40s
    cluster: cluster1
    domain: test-domain-aa
    want:
      dlqCountAtLeast: 1

  # Failover region0 from cluster0 to cluster1. cluster1 becomes active for the workflows,
  # so its DLQ processor can re-inject and drain the DLQ tasks.
  - op: change_active_clusters
    at: 45s
    domain: test-domain-aa
    newClusterAttributes:
      region:
        region0: cluster1 # changed from cluster0 to cluster1
        region1: cluster1

  # Assert that after failover + a couple of DLQ processor intervals, the DLQ on cluster1
  # has drained back to zero.
  - op: validate_dlq
    at: 130s
    cluster: cluster1
    domain: test-domain-aa
    want:
      dlqCountAtMost: 0

  # Assert that the ack level has advanced past the fill-time sentinel. 
  - op: validate_dlq_ack_level
    at: 132s
    cluster: cluster1
    domain: test-domain-aa
    want:
      dlqClusterAttributeScope: region
      dlqClusterAttributeName: region0
      dlqAckLevelTaskIDAtLeast: 1

  # Validation that a sample of the workflows have completed, and the completing worker
  # should be on cluster1.
  - op: validate
    at: 170s
    workflowID: dlq-wf1
    cluster: cluster1
    domain: test-domain-aa
    want:
      status: completed
      completedByWorkersInCluster: cluster1
  - op: validate
    at: 171s
    workflowID: dlq-wf10
